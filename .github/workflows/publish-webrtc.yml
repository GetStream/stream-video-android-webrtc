name: Publish WebRTC to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        default: "130.0.1-SNAPSHOT"
      branch:
        description: "Branch name in GetStream/webrtc to use"
        required: true
        default: "patch/m137.5"
      publish_snapshot:
        description: "Publish as snapshot version"
        required: false
        default: true
        type: boolean

jobs:
  publish:
    runs-on: runner-extra-capacity
    if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download WebRTC AAR artifact
        uses: actions/download-artifact@v4
        with:
          name: libwebrtc-aar
          path: ./

      - name: Verify AAR artifact
        run: |
          if [ ! -f "./libwebrtc.aar" ]; then
            echo "Error: libwebrtc.aar not found"
            exit 1
          fi
          echo "AAR artifact found: $(ls -la ./libwebrtc.aar)"

      - name: Configure environment variables
        run: |
          # Set environment variables for the Gradle build
          echo "OSSRH_USERNAME=${{ secrets.OSSRH_USERNAME }}" >> $GITHUB_ENV
          echo "OSSRH_PASSWORD=${{ secrets.OSSRH_PASSWORD }}" >> $GITHUB_ENV
          echo "SIGNING_KEY_ID=${{ secrets.SIGNING_KEY_ID }}" >> $GITHUB_ENV
          echo "SIGNING_PASSWORD=${{ secrets.SIGNING_PASSWORD }}" >> $GITHUB_ENV
          echo "SIGNING_KEY=${{ secrets.SIGNING_KEY }}" >> $GITHUB_ENV
          echo "SONATYPE_STAGING_PROFILE_ID=${{ secrets.SONATYPE_STAGING_PROFILE_ID }}" >> $GITHUB_ENV
          
          # Set version and snapshot configuration
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            SNAPSHOT="false"
          else
            VERSION="${{ github.event.inputs.version }}"
            SNAPSHOT="${{ github.event.inputs.publish_snapshot == 'true' }}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "SNAPSHOT=$SNAPSHOT" >> $GITHUB_ENV
          
          echo "Configured environment variables:"
          echo "Version: $VERSION"
          echo "Snapshot: $SNAPSHOT"

      - name: Verify Gradle setup
        run: |
          echo "Verifying Gradle project setup..."
          ./gradlew tasks --all | head -20
          echo ""
          echo "Project version: $version"
          echo "Snapshot mode: $SNAPSHOT"

      - name: Print artifacts to be published
        run: |
          echo "Artifacts to be published:"
          ./gradlew printAllArtifacts

      - name: Publish to Maven Central
        run: |
          echo "Publishing WebRTC AAR to Maven Central..."
          echo "Version: $version"
          echo "Snapshot: $SNAPSHOT"
          
          ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository

      - name: Verify publication
        run: |
          echo "Publication completed successfully!"
          echo "Published artifact: io.getstream:webrtc-android:$version"
          
          # For non-snapshot versions, show staging repository info
          if [ "$SNAPSHOT" != "true" ]; then
            echo ""
            echo "🚀 Release version published and released to Maven Central!"
            echo "The artifact should be available on Maven Central within 10 minutes."
            echo "Search for: io.getstream:webrtc-android:$version"
          else
            echo ""
            echo "📦 Snapshot version published!"
            echo "Available at: https://central.sonatype.com/repository/maven-snapshots/io/getstream/webrtc-android/"
          fi
