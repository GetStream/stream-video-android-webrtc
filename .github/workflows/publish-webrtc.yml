name: Publish WebRTC to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
      publish_snapshot:
        description: "Publish as snapshot version"
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: runner-extra-capacity
    if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Verify AAR artifact
        run: |
          if [ ! -f "./artifacts/libwebrtc.aar" ]; then
            echo "Error: libwebrtc.aar not found in artifacts directory"
            echo "Please place the libwebrtc.aar file in the artifacts/ directory"
            exit 1
          fi
          echo "AAR artifact found: $(ls -la ./artifacts/libwebrtc.aar)"

      - name: Set version and snapshot variables
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            SNAPSHOT="false"
          else
            VERSION="${{ github.event.inputs.version }}"
            SNAPSHOT="${{ github.event.inputs.publish_snapshot }}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "SNAPSHOT=$SNAPSHOT" >> $GITHUB_ENV
          
          echo "Configured environment variables:"
          echo "Version: $VERSION"
          echo "Snapshot: $SNAPSHOT"

      - name: Verify Gradle setup
        run: |
          echo "Verifying Gradle project setup..."
          ./gradlew tasks --all | head -20
          echo ""
          echo "Project version: $version"
          echo "Snapshot mode: $SNAPSHOT"

      - name: Print artifacts to be published
        env:
          ORG_GRADLE_PROJECT_version: ${{ env.version }}
          ORG_GRADLE_PROJECT_SNAPSHOT: ${{ env.SNAPSHOT }}
        run: |
          echo "Artifacts to be published:"
          ./gradlew printAllArtifacts

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_RELEASE_SIGNING_ENABLED: true
          ORG_GRADLE_PROJECT_version: ${{ env.version }}
          ORG_GRADLE_PROJECT_SNAPSHOT: ${{ env.SNAPSHOT }}
        run: |
          echo "Version: $version"
          echo "Snapshot: $SNAPSHOT"
          
          ./gradlew publishToMavenCentral

      - name: Verify publication
        run: |
          echo "Publication completed successfully!"
          echo "Published artifact: io.getstream:stream-video-webrtc-android:$version"
          
          # For non-snapshot versions, show staging repository info
          if [ "$SNAPSHOT" != "true" ]; then
            echo ""
            echo "🚀 Release version published and released to Maven Central!"
            echo "The artifact should be available on Maven Central within 10 minutes."
            echo "Search for: io.getstream:stream-video-webrtc-android:$version"
          else
            echo ""
            echo "📦 Snapshot version published!"
            echo "Available at: https://central.sonatype.com/repository/maven-snapshots/io/getstream/stream-video-webrtc-android/"
          fi
