name: Build WebRTC Android

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name in GetStream/webrtc to build"
        required: true
        default: "patch/m137.4"

jobs:
  build:
    runs-on: runner-extra-capacity

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openjdk-8-jdk lsb-release software-properties-common

      # -----------------------------
      # Cache depot_tools
      # -----------------------------
      - name: Cache depot_tools
        uses: actions/cache@v3
        with:
          path: $HOME/webrtc/depot_tools
          key: depot_tools-v1

      - name: Set up depot_tools
        run: |
          mkdir -p $HOME/webrtc
          cd $HOME/webrtc
          if [ ! -d "$HOME/webrtc/depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi
          echo "$HOME/webrtc/depot_tools" >> $GITHUB_PATH

      # -----------------------------
      # Cache WebRTC gclient sync
      # -----------------------------
      - name: Cache WebRTC dependencies
        uses: actions/cache@v3
        with:
          path: $HOME/webrtc/src
          key: webrtc-src-${{ github.event.inputs.branch }}

      - name: Clone WebRTC repo
        run: |
          cd $HOME/webrtc
          if [ ! -d "$HOME/webrtc/src" ]; then
            git clone https://github.com/GetStream/webrtc.git src
          fi
          cd src
          git fetch --all
          git checkout ${{ github.event.inputs.branch }}

      - name: Configure gclient
        run: |
          cd $HOME/webrtc
          gclient root
          gclient config --spec 'solutions = [
            {
              "name": "src",
              "url": "https://github.com/GetStream/webrtc.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
            },
          ]
          target_os = ["android", "unix"]
          '

      - name: Sync dependencies
        run: |
          cd $HOME/webrtc
          gclient sync

      - name: Install WebRTC build deps
        run: |
          cd $HOME/webrtc/src
          ./build/install-build-deps.sh

      # -----------------------------
      # Cache WebRTC build outputs
      # -----------------------------
      - name: Cache WebRTC build output
        uses: actions/cache@v3
        with:
          path: $HOME/webrtc/src/out
          key: webrtc-build-${{ github.event.inputs.branch }}

      - name: Build WebRTC AAR
        run: |
          cd $HOME/webrtc/src
          # Disable Werror to allow unused functions
          python3 ./tools_webrtc/android/build_aar.py -j$(nproc) --extra_gn_args="treat_warnings_as_errors=false"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-aar
          path: $HOME/webrtc/src/libwebrtc.aar

      - name: Clean build outputs
        if: success()
        run: rm -rf $HOME/webrtc/src/out
