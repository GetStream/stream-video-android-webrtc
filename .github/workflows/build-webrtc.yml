name: Build WebRTC Android

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name in GetStream/webrtc to build"
        required: true
        default: "patch/m137.5"

jobs:
  build:
    runs-on: runner-extra-capacity

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openjdk-8-jdk lsb-release software-properties-common

      # -----------------------------
      # Setup depot_tools (persistent)
      # -----------------------------
      - name: Ensure depot_tools exists
        run: |
          mkdir -p /home/runner/webrtc
          cd /home/runner/webrtc
          if [ ! -d "depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi
          echo "/home/runner/webrtc/depot_tools" >> $GITHUB_PATH

      - name: Verify depot_tools
        run: |
          which gclient
          gclient --version || echo "gclient ready"


      # -----------------------------
      # Update WebRTC repo (persistent)
      # -----------------------------
      - name: Update WebRTC repo
        run: |
          mkdir -p home/runner/webrtc
          cd home/runner/webrtc
          if [ ! -d "src" ]; then
            git clone https://github.com/GetStream/webrtc.git src
          fi
          cd src
          git fetch origin
          git checkout ${{ github.event.inputs.branch }}

      # -----------------------------
      # Sync dependencies (reuse existing)
      # -----------------------------
#      - name: Sync dependencies
#        run: |
#          cd home/runner/webrtc
#          gclient root
#          gclient config --spec 'solutions = [
#            {
#              "name": "src",
#              "url": "https://github.com/GetStream/webrtc.git",
#              "deps_file": "DEPS",
#              "managed": False,
#              "custom_deps": {},
#            },
#          ]
#          target_os = ["android", "unix"]
#          '
#          gclient sync --force

      - name: Install WebRTC build deps
        run: |
          cd home/runner/webrtc/src
          ./build/install-build-deps.sh

      - name: Set JDK 8
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          javac -version

      - name: Print WebRTC Java and NDK version
        run: |
          echo "=== JAVA VERSION USED BY WEBRTC ==="
          if [ -x "$HOME/webrtc/src/third_party/jdk/current/bin/java" ]; then
            $HOME/webrtc/src/third_party/jdk/current/bin/java -version
          else
            java -version
          fi

          echo ""
          echo "=== NDK VERSION USED BY WEBRTC ==="
          if [ -f "$HOME/webrtc/src/third_party/android_toolchain/ndk/source.properties" ]; then
            grep Pkg.Revision $HOME/webrtc/src/third_party/android_toolchain/ndk/source.properties
          else
            echo "NDK not found yet (will be fetched during gclient sync)"
          fi

          echo ""
          echo "=== GN ARGS (if build dir exists) ==="
          BUILD_DIR=$(find /tmp -maxdepth 1 -type d -name 'tmp*' | head -n 1)
          if [ -n "$BUILD_DIR" ]; then
            gn args "$BUILD_DIR/armeabi-v7a" --list || true
          else
            echo "Build dir not found yet"
          fi

      # -----------------------------
      # Build WebRTC AAR
      # -----------------------------
      - name: Build WebRTC AAR
        run: |
          cd home/runner/webrtc/src
          python3 ./tools_webrtc/android/build_aar.py \
            --arch armeabi-v7a arm64-v8a x86 x86_64 \
            --extra-gn-args treat_warnings_as_errors=false \
            --extra-ninja-switches=-j$(nproc)

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-aar
          path: home/runner/webrtc/src/libwebrtc.aar

      # -----------------------------
      # Optional: Clean old build outputs
      # -----------------------------
      - name: Clean old builds (>14 days)
        run: |
          find home/runner/webrtc/out -type d -mtime +14 -exec rm -rf {} +
